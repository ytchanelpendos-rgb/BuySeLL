<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#444;
font-family:sans-serif;
color:white;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.category{
background:#666;
padding:20px;
text-align:center;
border:2px solid black;
}

.search{
margin:20px 0;
padding:15px;
background:#555;
border:3px solid #00ff00;
text-align:center;
font-size:20px;
}

.items{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#666;
border:2px solid black;
padding:10px;
}

img{
width:100%;
}

</style>
</head>

<body>

<div class="grid">
<div class="category">Транспорт</div>
<div class="category">Электроника</div>
<div class="category">Работа</div>
<div class="category">Недвижимость</div>
<div class="category">Услуги</div>
<div class="category">Личные вещи</div>
</div>

<div class="search">
ПОИСК
</div>

<div class="items">

<div class="card">
<img src="https://picsum.photos/200">
<p>Велосипед — 5000 ₽</p>
</div>

<div class="card">
<img src="https://picsum.photos/200">
<p>Телефон — 8000 ₽</p>
</div>

</div>

</body>
</html>
