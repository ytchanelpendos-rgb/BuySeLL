<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#444;
font-family:sans-serif;
color:white;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.category{
background:#666;
padding:20px;
text-align:center;
border:2px solid black;
}

.search{
margin:20px 0;
padding:15px;
background:#555;
border:3px solid #00ff00;
text-align:center;
font-size:20px;
}

.items{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#666;
border:2px solid black;
padding:10px;
}

img{
width:100%;
}

</style>
</head>

<body>

<div class="grid">
<div class="category">Транспорт</div>
<div class="category">Электроника</div>
<div class="category">Работа</div>
<div class="category">Недвижимость</div>
<div class="category">Услуги</div>
<div class="category">Личные вещи</div>
</div>

<div class="search">
ПОИСК
</div>

<div class="items">

<div class="card">
<img src="https://picsum.photos/200">
<p>Велосипед — 5000 ₽</p>
</div>

<div class="card">
<img src="https://picsum.photos/200">
<p>Телефон — 8000 ₽</p>
</div>

</div>
<button onclick="openForm()" style="width:100%;padding:15px;font-size:18px;margin-top:20px;">
Разместить объявление
</button>

<div id="form" style="display:none;margin-top:20px;background:#555;padding:15px;">

<input id="title" placeholder="Название товара" style="width:100%;margin-bottom:10px;padding:10px">

<input id="price" placeholder="Цена" style="width:100%;margin-bottom:10px;padding:10px">

<input id="image" placeholder="Ссылка на фото" style="width:100%;margin-bottom:10px;padding:10px">

<button onclick="addItem()" style="width:100%;padding:10px;">Добавить</button>

</div>

<script>

function openForm(){
document.getElementById("form").style.display="block"
}

function addItem(){

let title=document.getElementById("title").value
let price=document.getElementById("price").value
let image=document.getElementById("image").value

let card=`
<div class="card">
<img src="${image}">
<p>${title} — ${price} ₽</p>
</div>
`

document.querySelector(".items").innerHTML+=card

}

</script>
</body>
</html>
